<!DOCTYPE html>
<html>
<head>
    <title>功能测试</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .pass { background: #d9f7be; }
        .fail { background: #ffccc7; }
    </style>
</head>
<body>
    <h1>功能测试</h1>
    
    <div class="test">
        <h3>1. 文件检查</h3>
        <div id="fileCheck">测试中...</div>
    </div>
    
    <div class="test">
        <h3>2. JavaScript检查</h3>
        <div id="jsCheck">测试中...</div>
    </div>
    
    <div class="test">
        <h3>3. 链接检查</h3>
        <div id="linkCheck">测试中...</div>
    </div>
    
    <script>
        // 文件检查
        const files = ['index.html', 'exam.html', 'game.html', 'report.html'];
        let fileResults = '';
        
        files.forEach(file => {
            const xhr = new XMLHttpRequest();
            xhr.open('HEAD', file, false);
            try {
                xhr.send();
                if (xhr.status === 200) {
                    fileResults += `<p>✅ ${file} 存在</p>`;
                } else {
                    fileResults += `<p>❌ ${file} 不存在 (${xhr.status})</p>`;
                }
            } catch (e) {
                fileResults += `<p>❌ ${file} 错误: ${e.message}</p>`;
            }
        });
        
        document.getElementById('fileCheck').innerHTML = fileResults;
        
        // JavaScript检查
        const jsFiles = ['js/app.js', 'js/game.js', 'js/exam.js', 'js/report.js', 'js/utils.js'];
        let jsResults = '';
        
        jsFiles.forEach(file => {
            const script = document.createElement('script');
            script.src = file;
            script.onload = () => {
                jsResults += `<p>✅ ${file} 加载成功</p>`;
                document.getElementById('jsCheck').innerHTML = jsResults;
            };
            script.onerror = () => {
                jsResults += `<p>❌ ${file} 加载失败</p>`;
                document.getElementById('jsCheck').innerHTML = jsResults;
            };
            document.head.appendChild(script);
        });
        
        // 链接检查
        setTimeout(() => {
            const links = [
                { name: '首页', url: 'index.html' },
                { name: '游戏', url: 'game.html' },
                { name: '考试', url: 'exam.html' },
                { name: '报告', url: 'report.html' }
            ];
            
            let linkResults = '';
            links.forEach(link => {
                linkResults += `<p><a href="${link.url}" target="_blank">测试 ${link.name}</a></p>`;
            });
            
            document.getElementById('linkCheck').innerHTML = linkResults;
        }, 1000);
    </script>
</body>
</html>
